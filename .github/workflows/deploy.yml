name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh official results and snapshot predictions every 6 hours.
    - cron: "0 */6 * * *"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build the site from a freshly-synced working tree and publish it. This job
  # never commits, so branch protection on main can never block a deploy — the
  # page is always current with live FIFA data baked into the artifact.
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Refresh official results (working tree only)
        run: world-cup-oracle sync-fifa --apply
      - name: Release check
        run: world-cup-oracle release-check
      - name: Build static site
        run: python scripts/build_site.py _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

  # Persist the audit trail: sync data, record a timestamped prediction
  # snapshot, and open/refresh a single rolling PR to main (branch protection
  # requires a PR, so we never push to main directly). Only runs on a schedule
  # or manual dispatch, not on push, to avoid loops.
  snapshot:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Sync official results
        run: world-cup-oracle sync-fifa --apply
      - name: Snapshot predictions
        run: world-cup-oracle snapshot-predictions
      - name: Open or update data-refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: data
          branch: automated/data-refresh
          commit-message: "chore(data): scheduled results sync and prediction snapshot"
          title: "chore(data): automated results + prediction snapshots"
          body: |
            Automated by the Deploy workflow: latest official FIFA results plus a
            timestamped prediction snapshot appended to `data/snapshots/`
            (the prediction audit trail). Safe to squash-merge.
          labels: automated
