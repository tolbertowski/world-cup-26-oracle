name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh official results every 6 hours while the tournament runs.
    - cron: "0 */6 * * *"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Sync official FIFA results
        if: github.event_name != 'push'
        run: world-cup-oracle sync-fifa --apply
      - name: Release check
        run: world-cup-oracle release-check
      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- data; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore(data): scheduled official results sync"
          git push origin main

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Re-resolve main so the site includes any data commit from the sync job.
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build static site
        run: python scripts/build_site.py _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
